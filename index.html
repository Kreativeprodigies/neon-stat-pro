
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROSTAT™ // Intelligence Engine</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography,aspect-ratio"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
              mono: ['SF Mono', 'JetBrains Mono', 'Fira Code', 'monospace'],
            },
            colors: {
              obsidian: '#09090b', // Zinc 950
              darkcard: '#18181b', // Zinc 900
              darkborder: '#27272a', // Zinc 800
              electric: '#635bff', // Stripe Indigo
              spotify: '#1ed760',  // Spotify Green
              apple: '#f5f5f7',    // Apple Silver
              lightgray: '#a1a1aa' // Zinc 400
            },
            animation: {
              'fade-in': 'fadeIn 0.4s ease-out',
              'shimmer': 'shimmer 2.5s infinite linear',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(4px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' }
              },
              shimmer: {
                '0%': { 'background-position': '-200% 0' },
                '100%': { 'background-position': '200% 0' }
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #09090b;
            color: #f4f4f5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        /* Smooth scrollbars in the spirit of Spotify & Vercel */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #09090b;
        }
        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3f3f46;
        }

        /* Subtle grid background similar to Vercel/Stripe */
        .grid-bg {
            background-size: 24px 24px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        }

        /* Subtle radial ambient gradient */
        .radial-glow {
            background: radial-gradient(circle 800px at 50% -200px, rgba(99, 91, 255, 0.08), transparent 80%);
        }

        /* Clean utilities */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.37.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>
<body class="bg-obsidian text-zinc-100 selection:bg-electric/20 antialiased">
    <div class="fixed inset-0 grid-bg pointer-events-none opacity-80 z-0"></div>
    <div class="fixed inset-0 radial-glow pointer-events-none z-0"></div>
    <div id="root" class="relative z-10 min-h-screen"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
